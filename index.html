<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTUM PREDICTOR V2 - FIXED</title>

<style>
body{
    background:#0a0015;
    color:#fff;
    font-family:Arial;
    text-align:center;
}
.box{
    margin:20px auto;
    padding:20px;
    width:320px;
    background:#1e293b;
    border-radius:10px;
}
.big{color:#22c55e;}
.small{color:#3b82f6;}
.red{color:#ef4444;}
.green{color:#22c55e;}
</style>
</head>

<body>

<h2>🔥 QUANTUM PREDICTOR 🔥</h2>

<div class="box">
    <div id="periodDisplay">PERIOD: --</div>
    <div id="last">Last: --</div>
</div>

<div class="box">
    <h3>PREDICTION</h3>
    <div id="mainPrediction">--</div>
    <div id="color">--</div>
    <div id="numbers">--</div>
</div>

<div class="box">
    <h3>HISTORY</h3>
    <table border="1" width="100%">
        <thead>
            <tr>
                <th>Period</th>
                <th>Pred</th>
                <th>Result</th>
            </tr>
        </thead>
        <tbody id="log"></tbody>
    </table>
</div>

<script>

/* ✅ FIXED API */
const DATA_STREAM = "https://api.allorigins.win/raw?url=https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

let prevPeriod=null;
let nextPrediction=null;

/* SIZE */
function getSize(n){
    return n>=5?"BIG":"SMALL";
}

/* SIMPLE PREDICT */
function predict(sizes){
    let big=sizes.filter(x=>x==="BIG").length;
    let small=sizes.length-big;
    return big>small?"BIG":"SMALL";
}

/* COLOR */
function getColor(nums){
    let map={0:"RED",1:"GREEN",2:"RED",3:"GREEN",4:"RED",
             5:"GREEN",6:"RED",7:"GREEN",8:"RED",9:"GREEN"};
    let arr=nums.slice(0,10).map(n=>map[n]);
    let count={};
    arr.forEach(c=>count[c]=(count[c]||0)+1);
    return Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b);
}

/* NUMBERS */
function suggest(size,last){
    let pool=size==="BIG"?[6,7,8,9]:[1,2,3,4];
    pool=pool.filter(x=>x!==last);
    return pool.sort(()=>0.5-Math.random()).slice(0,2);
}

/* 🔥 FIXED FETCH */
async function fetchData(){
    try{
        let res=await fetch(DATA_STREAM);
        let data=await res.json();

        let list=data?.data?.list || data?.data || data?.list;
        if(!list || list.length===0) return;

        let nums=list.map(x=>parseInt(x.number ?? x.openCode ?? x.result));
        let sizes=nums.map(getSize);

        let period=list[0].issueNumber || list[0].period;
        let lastNum=nums[0];

        if(!period || isNaN(lastNum)) return;

        if(period!==prevPeriod){

            let pred=predict(sizes);
            let color=getColor(nums);
            let numbers=suggest(pred,lastNum);

            document.getElementById("periodDisplay").innerText="PERIOD: "+period;
            document.getElementById("last").innerText="Last: "+lastNum;

            document.getElementById("mainPrediction").innerHTML=
            `<span class="${pred.toLowerCase()}">${pred}</span>`;

            document.getElementById("color").innerHTML=
            `<span class="${color.toLowerCase()}">${color}</span>`;

            document.getElementById("numbers").innerText=numbers.join(", ");

            /* LOG */
            let row=`
            <tr>
                <td>${period}</td>
                <td>${pred}</td>
                <td>${getSize(lastNum)}(${lastNum})</td>
            </tr>`;
            document.getElementById("log").insertAdjacentHTML("afterbegin",row);

            prevPeriod=period;
        }

    }catch(e){
        document.getElementById("periodDisplay").innerText="DATA ERROR";
    }
}

/* LOOP */
setInterval(fetchData,3000);
fetchData();

</script>

</body>
</html>
